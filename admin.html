<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

<style>
.admin-container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.form-box {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 15px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #9d4edd;
    color: white;
    cursor: pointer;
}

.card {
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
}

.table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

.table th, .table td {
    padding: 10px;
    border-bottom: 1px solid #ccc;
}
</style>

</head>

<body>

<!-- 🔐 PROTECTED CONTENT -->
<div id="adminPanel" style="display:none;">

<div class="admin-container">

<h1>📊 Admin Dashboard</h1>

<!-- FORM -->
<div class="form-box">

<h2>Add Result</h2>

<select id="eventName">
  <option value="">Event Name</option>
  <option>Dance</option>
  <option>Song</option>
  <option>Mappila pattu</option>
  <option>Individual song</option>
  <option>Group song</option>
</select>

<select id="first">
  <option value="">Select 1st</option>
  <option>CSE</option>
  <option>ECE</option>
  <option>MECH</option>
  <option>EEE</option>
  <option>AD</option>
  <option>CIVIL</option>
  <option>MCA</option>
</select>

<select id="second">
  <option value="">Select 2nd</option>
  <option>CSE</option>
  <option>ECE</option>
  <option>MECH</option>
  <option>EEE</option>
  <option>AD</option>
  <option>CIVIL</option>
  <option>MCA</option>
</select>

<select id="third">
  <option value="">Select 3rd</option>
  <option>CSE</option>
  <option>ECE</option>
  <option>MECH</option>
  <option>EEE</option>
  <option>AD</option>
  <option>CIVIL</option>
  <option>MCA</option>
</select>

<button onclick="addResult()">Add Result</button>

</div>

<!-- TABLE -->
<table class="table" id="resultsTable">
<thead>
<tr>
<th>Event</th>
<th>1st</th>
<th>2nd</th>
<th>3rd</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- LEADERBOARD -->
<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<!-- 🔥 LOGOUT -->
<div style="text-align:center; margin-top:40px;">
  <button onclick="logout()" style="
    width:200px;
    background:#ff4d4d;
    font-weight:bold;
  ">
    🚪 Logout
  </button>
</div>

</div>
</div>

<script type="module">

// 🔥 Firebase imports (TOP)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getFirestore, collection, addDoc, doc, updateDoc, increment,
  onSnapshot, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB_pWzRpFgKMwYNwgefDqAHqSU4T4Cpksc",
  authDomain: "vibrance-5e4f4.firebaseapp.com",
  projectId: "vibrance-5e4f4",
};


// 🔥 Initialize
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


// 🔐 Protect page
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("adminPanel").style.display = "block";
  }
});


// 🚪 Logout
window.logout = async function() {
  await signOut(auth);
  window.location.href = "login.html";
};



// ===============================
// ✅ 👉 PUT YOUR FUNCTION HERE
// ===============================

window.addResult = async function() {

  const eventName = document.getElementById("eventName").value;
  const first = document.getElementById("first").value;
  const second = document.getElementById("second").value;
  const third = document.getElementById("third").value;

  if (!eventName || !first || !second || !third) {
    alert("Fill all fields ❗");
    return;
  }

  try {

    // 🔍 Check duplicate event
    const q = query(
      collection(db, "results"),
      where("eventName", "==", eventName)
    );

    const snapshot = await getDocs(q);

    if (!snapshot.empty) {
      // ❌ STOP if exists
      alert("❌ This event result already exists!");
      return;
    }

    // ➕ Add new result
    await addDoc(collection(db, "results"), {
      eventName,
      first,
      second,
      third
    });

    // 🏆 Update leaderboard
    const points = { first: 5, second: 3, third: 1 };

    await updateDoc(doc(db, "leaderboard", first.toLowerCase()), {
      score: increment(points.first)
    });

    await updateDoc(doc(db, "leaderboard", second.toLowerCase()), {
      score: increment(points.second)
    });

    await updateDoc(doc(db, "leaderboard", third.toLowerCase()), {
      score: increment(points.third)
    });

    alert("✅ Result Added Successfully");

  } catch (error) {
    console.error(error);
    alert(error.message);
  }

};
// 📊 RESULTS TABLE
const tableBody = document.querySelector("#resultsTable tbody");

onSnapshot(collection(db, "results"), (snapshot) => {

  tableBody.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    tableBody.innerHTML += `
      <tr>
        <td>${data.eventName || "N/A"}</td>
        <td>${data.first}</td>
        <td>${data.second}</td>
        <td>${data.third}</td>
      </tr>
    `;
  });

});


// 🏆 LEADERBOARD
const leaderboardDiv = document.getElementById("leaderboard");

onSnapshot(collection(db, "leaderboard"), (snapshot) => {

  let data = [];

  snapshot.forEach(doc => {
    data.push(doc.data());
  });

  data.sort((a, b) => b.score - a.score);

  leaderboardDiv.innerHTML = "";

  data.forEach((dept, index) => {

    const medals = ["🥇","🥈","🥉"];

    leaderboardDiv.innerHTML += `
      <div class="card">
        ${medals[index] || ""} ${dept.name} - ${dept.score} pts
      </div>
    `;
  });

});

</script>

</body>
</html>
