<!DOCTYPE html>
<html>
<head>

<title>Register - VIBRANCE</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav>
  <a href="index.html">Home</a> |
  <a href="events.html">Events</a> |
  <a href="register.html">Register</a>
</nav>

<div class="form-container">

<h2>VIBRANCE Event Registration</h2>

<form id="registerForm">

<label>Student Name</label>
<input id="name" type="text" placeholder="Enter your name" required>

<label>Register Number</label>
<input id="reg" type="text" placeholder="Enter register number" required>

<label>Email</label>
<input id="email" type="email" placeholder="Enter email" required>

<label>Department</label>
<select id="dept" required>
<option value="">Select Department</option>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
<option>MCA</option>
</select>

<!-- ✅ NEW EVENT FIELD -->
<label>Event Name</label>
<input id="event" type="text" readonly>

<button type="submit">Register</button>
<p id="msg" style="color:white; text-align:center;"></p>
<p id="successMsg"></p>

</form>

</div>

<!-- ✅ AUTO-FILL EVENT FROM URL -->
<script>
const params = new URLSearchParams(window.location.search);
const eventName = params.get("event");

if(eventName){
document.getElementById("event").value = eventName;
}
</script>

<!-- ✅ FIREBASE BACKEND -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDM-RJYuTB1-qHU75cBJOVL_W_EpQShr_Q",
  authDomain: "vibrance-fest-1310a.firebaseapp.com",
  projectId: "vibrance-fest-1310a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

msg.innerText = "Registering...";

const name = document.getElementById("name").value;
const reg = document.getElementById("reg").value;
const email = document.getElementById("email").value;
const dept = document.getElementById("dept").value;
const event = document.getElementById("event").value;

try {

await addDoc(collection(db,"registrations"),{
name,
register:reg,
email,
department:dept,
event,
time:new Date()
});

msg.innerText = "✔ Registration Successful";

} catch(error){

msg.innerText = "❌ " + error.message;
console.log(error);

}

});

</script>

</body>
</html>
